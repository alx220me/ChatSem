services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - backend

  pgbouncer:
    image: bitnami/pgbouncer:1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./pgbouncer/pgbouncer.ini:/bitnami/pgbouncer/conf/pgbouncer.ini:ro
      - ./pgbouncer/userlist.txt:/bitnami/pgbouncer/conf/userlist.txt:ro
    environment:
      PGBOUNCER_DATABASE: ${POSTGRES_DB}
      POSTGRESQL_HOST: postgres
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - backend

  # ── Go backend services ─────────────────────────────────────────────────────

  chat:
    build:
      context: ..
      dockerfile: deploy/services/chat/Dockerfile
    env_file: .env
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  auth:
    build:
      context: ..
      dockerfile: deploy/services/auth/Dockerfile
    env_file: .env
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  admin:
    build:
      context: ..
      dockerfile: deploy/services/admin/Dockerfile
    env_file: .env
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  # ── Frontend builds ─────────────────────────────────────────────────────────

  widget:
    build:
      context: ..
      dockerfile: deploy/frontend/widget/Dockerfile
    networks:
      - frontend

  admin-panel:
    build:
      context: ..
      dockerfile: deploy/frontend/admin/Dockerfile
    networks:
      - frontend

  # ── Nginx reverse proxy ─────────────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - chat
      - auth
      - admin
      - widget
      - admin-panel
    networks:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
