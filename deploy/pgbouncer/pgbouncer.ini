[databases]
chatsem = host=postgres port=5432 dbname=chatsem

[pgbouncer]
listen_addr = *
listen_port = 5432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 200
default_pool_size = 50
server_round_robin = 1
log_connections = 0
log_disconnections = 0
