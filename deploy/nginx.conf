upstream chat_backend {
    server chat:8080;
    keepalive 200;
}

upstream auth_backend {
    server auth:8081;
}

upstream admin_backend {
    server admin:8082;
}

upstream widget_backend {
    server widget:80;
}

upstream admin_panel_backend {
    server admin-panel:80;
}

server {
    listen 80;

    # Nginx-level health check (no upstream needed)
    location = /health {
        return 200 '{"status":"ok","service":"nginx"}';
        add_header Content-Type application/json;
    }

    # Chat service — long polling needs extended read timeout
    location /api/chat/ {
        proxy_pass         http://chat_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 35s;
    }

    # Auth service
    location /api/auth/ {
        proxy_pass         http://auth_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
    }

    # Admin service — export streaming may take longer
    location /api/admin/ {
        proxy_pass         http://admin_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }

    # Test page (static, served directly by nginx)
    location /test/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/index.html =404;
    }

    # Widget static files — strip /widget/ prefix before forwarding
    location /widget/ {
        proxy_pass         http://widget_backend/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # Admin SPA — proxy all remaining requests to admin-panel container
    location / {
        proxy_pass         http://admin_panel_backend/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }
}
