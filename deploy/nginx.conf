upstream chat_backend {
    server chat:8080;
    keepalive 200;
}

upstream auth_backend {
    server auth:8081;
}

upstream admin_backend {
    server admin:8082;
}

server {
    listen 80;

    # Chat service — long polling needs extended read timeout
    location /api/chat/ {
        proxy_pass         http://chat_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 35s;  # LongPollTimeout(25s) + buffer
    }

    # Auth service
    location /api/auth/ {
        proxy_pass         http://auth_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
    }

    # Admin service — export streaming may take longer
    location /api/admin/ {
        proxy_pass         http://admin_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
        proxy_buffering    off;  # required for streaming export
    }

    # Widget static files
    location /widget/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ =404;
    }

    # Admin SPA — fallback to index.html for client-side routing
    location / {
        root /usr/share/nginx/html/admin;
        try_files $uri /index.html;
    }
}
